title: "테스트 가능한 시간을 위한 Clock"
oldApproach: "시스템 시간"
modernApproach: "주입된 Clock"
summary: "날짜/시간 로직에서 시스템 시계를 하드코딩하지 말고 java.time.Clock을 주입하세요."
explanation: "도메인 코드 안에서 now()를 직접 호출하면 시간 의존 동작을 테스트하기 어렵습니다. Clock을 사용하면 프로덕션 코드는 시스템 시계를 사용하고 테스트는 Clock.fixed()나 Clock.offset()을 제공할 수 있습니다. 로직은 여전히 java.time API를 사용하지만, 시간은 숨겨진 전역 상태가 아니라 명시적인 의존성이 됩니다."
whyModernWins:
- icon: "🧪"
  title: "결정적 테스트"
  desc: "테스트는 sleep하거나 실제 시계와 경쟁하지 않고 Clock.fixed()로 시간을 고정할 수 있습니다."
- icon: "👁"
  title: "명시적 의존성"
  desc: "시간에 의존하는 클래스는 생성자에서 그 사실을 드러냅니다."
- icon: "🌍"
  title: "시간대 인식"
  desc: "Clock은 ZoneId를 포함하므로 시간대 결정이 보이고 구성 가능해집니다."
support:
  description: "JDK 8부터 사용 가능 (2014년 3월)"
