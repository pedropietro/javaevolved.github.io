title: "CompletableFuture 타임아웃"
oldApproach: "수동 스케줄 작업"
modernApproach: "orTimeout()"
summary: "별도 scheduler 대신 CompletableFuture.orTimeout() 또는 completeOnTimeout()을 사용하세요."
explanation: "Java 9 이전에는 CompletableFuture에 타임아웃을 적용하려면 ScheduledExecutorService를 만들고 future를 수동으로 완료하는 작업을 연결해야 했습니다. 타임아웃 메서드는 그 동작을 future 자체에 둡니다. 작업이 실패해야 한다면 orTimeout()을, fallback 값을 원한다면 completeOnTimeout()을 사용하세요."
whyModernWins:
- icon: "⏱️"
  title: "내장 타임아웃"
  desc: "타임아웃 정책이 비동기 계산에 직접 붙습니다."
- icon: "🧹"
  title: "scheduler 보일러플레이트 없음"
  desc: "추가 executor, 스케줄 작업, 수동 예외 완료 블록이 필요 없습니다."
- icon: "🔀"
  title: "실패 또는 fallback 명확화"
  desc: "실패에는 orTimeout(), 기본값에는 completeOnTimeout()을 선택하세요."
support:
  description: "JDK 9부터 사용 가능 (2017년 9월)"
