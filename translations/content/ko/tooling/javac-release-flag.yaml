title: "교차 컴파일을 위한 javac --release"
oldApproach: "-source와 -target"
modernApproach: "--release"
summary: "이전 Java 버전을 대상으로 컴파일할 때 -source와 -target만 쓰지 말고 javac --release를 사용하세요."
explanation: "-source와 -target 플래그는 문법과 class file 버전을 제어하지만, 그 자체로 더 새로운 JDK API의 실수 사용을 막지는 못합니다. --release 플래그는 요청한 Java release에 맞는 언어 수준, class file 대상, 플랫폼 API를 선택합니다. 그래서 교차 컴파일이 더 안전하고 이해하기 쉬워집니다."
whyModernWins:
- icon: "🔒"
  title: "API 안전"
  desc: "컴파일러가 선택한 release에 없는 JDK API 호출을 거부합니다."
- icon: "🧹"
  title: "더 간단한 명령"
  desc: "하나의 플래그가 source, target, bootclasspath 스타일 설정을 대체합니다."
- icon: "📦"
  title: "신뢰할 수 있는 산출물"
  desc: "생성된 클래스가 지원하려는 Java 버전과 일치합니다."
support:
  description: "JDK 9부터 사용 가능 (2017년 9월)"
