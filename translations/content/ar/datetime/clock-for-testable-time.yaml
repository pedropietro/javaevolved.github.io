title: "Clock لوقت قابل للاختبار"
oldApproach: "وقت النظام"
modernApproach: "Clock محقون"
summary: "احقن java.time.Clock بدلاً من تثبيت ساعة النظام داخل منطق التاريخ والوقت."
explanation: "استدعاء now() مباشرة داخل كود النطاق يجعل السلوك المعتمد على الوقت صعب الاختبار. يتيح Clock لكود الإنتاج استخدام ساعة النظام، بينما توفر الاختبارات Clock.fixed() أو Clock.offset(). يستمر المنطق في استخدام API java.time، لكن الوقت يصبح تبعية صريحة بدلاً من حالة عالمية مخفية."
whyModernWins:
- icon: "🧪"
  title: "اختبارات حتمية"
  desc: "يمكن للاختبارات تجميد الوقت باستخدام Clock.fixed() بدلاً من النوم أو التسابق مع الساعة الحقيقية."
- icon: "👁"
  title: "تبعية صريحة"
  desc: "الفئات التي تعتمد على الوقت توضّح ذلك في constructor."
- icon: "🌍"
  title: "مدرك للمنطقة الزمنية"
  desc: "يحمل Clock قيمة ZoneId، مما يجعل قرارات المنطقة الزمنية مرئية وقابلة للضبط."
support:
  description: "متاح منذ JDK 8 (مارس 2014)"
