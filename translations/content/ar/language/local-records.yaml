title: "السجلات المحلية للبيانات المؤقتة"
oldApproach: "فئة مساعدة مؤقتة"
modernApproach: "سجل محلي"
summary: "استخدم السجلات المحلية لنمذجة أشكال البيانات قصيرة العمر في المكان الذي تحتاجها فيه بالضبط."
explanation: "عندما يوجد نوع مساعد من أجل عملية حسابية واحدة فقط، فإن تعريف DTO على مستوى الفئة يضيف ضجيجاً غير ضروري إلى الفئة المحيطة. يحافظ السجل المحلي على البنية المؤقتة قرب stream أو الاستعلام أو التحويل الذي يستخدمها. ما زلت تحصل على نوع مسمّى و accessors و equals و hashCode و toString، لكن نطاق الرؤية يبقى صغيراً."
whyModernWins:
- icon: "📍"
  title: "نطاق أضيق"
  desc: "يظهر النوع المساعد فقط داخل الطريقة التي تحتاج إليه."
- icon: "🧩"
  title: "شكل بيانات واضح"
  desc: "يوثق تعريف السجل الحقول المؤقتة من دون فئة DTO كاملة."
- icon: "✂️"
  title: "Boilerplate أقل"
  desc: "يتم توليد accessors والمساواة و hashCode و toString تلقائياً."
support:
  description: "متاح على نطاق واسع منذ JDK 16 (مارس 2021)"
