title: "Clock для тестируемого времени"
oldApproach: "Системное время"
modernApproach: "Внедренный Clock"
summary: "Внедряйте java.time.Clock вместо жесткой привязки к системным часам в логике даты и времени."
explanation: "Прямой вызов now() внутри доменного кода усложняет тестирование поведения, зависящего от времени. Clock позволяет production-коду использовать системные часы, а тестам предоставлять Clock.fixed() или Clock.offset(). Логика по-прежнему использует API java.time, но время становится явной зависимостью, а не скрытым глобальным состоянием."
whyModernWins:
- icon: "🧪"
  title: "Детерминированные тесты"
  desc: "Тесты могут заморозить время через Clock.fixed(), вместо sleep или гонки с реальными часами."
- icon: "👁"
  title: "Явная зависимость"
  desc: "Классы, зависящие от времени, показывают это в конструкторе."
- icon: "🌍"
  title: "Учет часового пояса"
  desc: "Clock несет ZoneId, делая решения о часовом поясе видимыми и настраиваемыми."
support:
  description: "Доступно с JDK 8 (март 2014)"
