title: "Проверки диапазона индексов с Objects"
oldApproach: "Ручная проверка границ"
modernApproach: "Objects.checkFromIndexSize()"
summary: "Используйте Objects.checkIndex(), checkFromToIndex() и checkFromIndexSize() для согласованных ошибок границ."
explanation: "Ручные проверки диапазонов легко тонко ошибочны, особенно когда offset и length могут переполниться или сообщение исключения должно оставаться единообразным. Helpers диапазонов в Objects централизуют распространенные шаблоны проверки индексов и возвращают проверенный индекс, чтобы значение сразу переходило в следующую операцию."
whyModernWins:
- icon: "🔒"
  title: "Меньше граничных ошибок"
  desc: "JDK согласованно обрабатывает типичные off-by-one и недопустимые диапазоны."
- icon: "🧹"
  title: "Меньше собственного кода"
  desc: "Замените повторяющиеся if-блоки и ad hoc сообщения исключений одним helper."
- icon: "➡️"
  title: "Композиционно"
  desc: "Проверенный индекс возвращается и может перейти в следующий slice или lookup."
support:
  description: "Доступно с JDK 9 (сентябрь 2017)"
