title: "Локальные record для временных данных"
oldApproach: "Вспомогательный класс ad hoc"
modernApproach: "Локальный record"
summary: "Используйте локальные record, чтобы моделировать краткоживущие структуры данных ровно там, где они нужны."
explanation: "Если вспомогательный тип нужен только для одного вычисления, DTO на уровне класса лишь добавляет шум. Локальный record держит временную структуру рядом со stream, запросом или преобразованием, которое ее использует. Вы по-прежнему получаете именованный тип, аксессоры, equals, hashCode и toString, но область видимости остается небольшой."
whyModernWins:
- icon: "📍"
  title: "Уже область видимости"
  desc: "Вспомогательный тип виден только внутри метода, которому он нужен."
- icon: "🧩"
  title: "Ясная форма данных"
  desc: "Объявление record документирует временные поля без полноценного DTO-класса."
- icon: "✂️"
  title: "Меньше boilerplate"
  desc: "Аксессоры, равенство, hashCode и toString генерируются автоматически."
support:
  description: "Широко доступно с JDK 16 (март 2021)"
