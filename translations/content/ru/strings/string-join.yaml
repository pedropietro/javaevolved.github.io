title: "String.join() для разделителей"
oldApproach: "Логика разделителей на StringBuilder"
modernApproach: "String.join()"
summary: "Заменяйте ручное управление разделителями на String.join(), чтобы получать более читаемые объединенные строки."
explanation: "Ручная сборка строки с разделителями обычно требует отслеживать первый элемент, условно добавлять разделители и в конце преобразовывать builder в строку. String.join() выражает намерение напрямую: объединить эти значения этим разделителем. Это удобно для меток, CSV-подобного вывода, логов и коротких строк отображения."
whyModernWins:
- icon: "✂️"
  title: "Меньше кода"
  desc: "Нет флага первого элемента, условной запятой и ручного жизненного цикла builder."
- icon: "👁"
  title: "Сначала намерение"
  desc: "Разделитель и значения видны в одном выражении."
- icon: "🧩"
  title: "Работает с Iterable"
  desc: "Используйте с массивами, списками, set или любым Iterable из значений CharSequence."
support:
  description: "Доступно с JDK 8 (март 2014)"
