title: "Сравнение байтов за постоянное время"
oldApproach: "Arrays.equals() для секретов"
modernApproach: "MessageDigest.isEqual()"
summary: "Используйте MessageDigest.isEqual() при сравнении MAC, подписей, токенов или хэшей паролей."
explanation: "Обычные helpers равенства могут вернуться сразу после первой разницы, что нормально для обычных данных, но нежелательно для байтов, полученных из секретов. MessageDigest.isEqual() предназначен для security-sensitive сравнений byte arrays и избегает очевидного паттерна раннего выхода. Используйте его для MAC, digest, подписей и проверочных токенов."
whyModernWins:
- icon: "🔐"
  title: "Безопаснее проверки секретов"
  desc: "Избегает обычной формы сравнения с ранним выходом, применяемой к несекретным данным."
- icon: "🧹"
  title: "Без самодельной криптографии"
  desc: "Используйте helper JDK вместо собственной петли сравнения байтов."
- icon: "🎯"
  title: "Ясное намерение"
  desc: "Ревьюеры сразу видят, что сравнение чувствительно к безопасности."
support:
  description: "Доступно во всех поддерживаемых современных JDK; рекомендуется для byte arrays, полученных из секретов."
