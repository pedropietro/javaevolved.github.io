modernApproach: "MessageDigest.isEqual()"
oldCode: |-
  if (Arrays.equals(expectedMac, actualMac)) {
      authenticate();
  }
modernCode: |-
  if (MessageDigest.isEqual(
          expectedMac, actualMac)) {
      authenticate();
  }
summary: "Use MessageDigest.isEqual() when comparing MACs, signatures, tokens, or password hashes."
explanation: "Regular equality helpers can return as soon as they find a difference, which is fine for ordinary data but undesirable for secret-derived bytes. MessageDigest.isEqual() is designed for security-sensitive byte-array comparisons and avoids the obvious early-exit pattern. Use it for values such as MACs, digests, signatures, and verification tokens."
