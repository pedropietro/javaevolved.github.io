oldCode: |-
  public void register(UserDto user) {
      if (user.email() == null ||
          !user.email().contains("@")) {
          throw new IllegalArgumentException(
              "Invalid email");
      }
      if (user.age() < 18) {
          throw new IllegalArgumentException(
              "Must be adult");
      }
      save(user);
  }
modernCode: |-
  public record UserDto(
      @Email @NotBlank String email,
      @Min(18) int age) {}

  public void register(@Valid UserDto user) {
      save(user);
  }
summary: "Replace repeated imperative validation with Jakarta Bean Validation constraints."
explanation: "Enterprise applications often repeat the same null, range, and format checks in controllers and services. Jakarta Bean Validation moves those rules onto the data model with annotations such as @NotBlank, @Email, @Min, and @Valid. Frameworks can then validate request bodies, method parameters, and entities consistently before business logic runs."
