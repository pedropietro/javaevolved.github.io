oldCode: |-
  if (offset < 0 || length < 0 ||
      offset + length > bytes.length) {
      throw new IndexOutOfBoundsException(
          "Invalid slice");
  }

  byte[] part = Arrays.copyOfRange(
      bytes, offset, offset + length);
modernCode: |-
  int from = Objects.checkFromIndexSize(
      offset, length, bytes.length);

  byte[] part = Arrays.copyOfRange(
      bytes, from, from + length);
summary: "Use Objects.checkIndex(), checkFromToIndex(), and checkFromIndexSize() for consistent bounds errors."
explanation: "Manual range checks are easy to get subtly wrong, especially when offset and length can overflow or when the exception message must stay consistent. The Objects range-checking helpers centralize common index validation patterns and return the validated index so the checked value flows directly into the next operation."
