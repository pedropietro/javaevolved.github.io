oldApproach: "Ad-hoc helper class"
modernApproach: "Local record"
oldCode: |-
  class ReportService {
      private static final class Row {
          final String department;
          final long total;

          Row(String department, long total) {
              this.department = department;
              this.total = total;
          }
      }

      void print(List<Order> orders) {
          // Row is visible to the whole class
      }
  }
modernCode: |-
  void print(List<Order> orders) {
      record Row(String department, long total) {}

      orders.stream()
          .map(o -> new Row(o.department(), o.total()))
          .forEach(System.out::println);
  }
summary: "Use local records to model short-lived data shapes exactly where they are needed."
explanation: "When a helper type exists only for one calculation, declaring a class-level DTO makes the surrounding class noisier than necessary. A local record keeps the temporary shape near the stream, query, or transformation that uses it. You still get a named type, accessors, equals, hashCode, and toString, but the scope stays small."
whyModernWins:
- icon: "📍"
  title: "Tighter scope"
  desc: "The helper type is visible only inside the method that needs it."
- icon: "🧩"
  title: "Clear data shape"
  desc: "The record declaration documents the temporary fields without a full DTO class."
- icon: "✂️"
  title: "Less boilerplate"
  desc: "Accessors, equality, hashCode, and toString are generated automatically."
