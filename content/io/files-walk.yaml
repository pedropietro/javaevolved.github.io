oldCode: |-
  void visit(File dir) {
      File[] files = dir.listFiles();
      if (files == null) return;

      for (File file : files) {
          if (file.isDirectory()) {
              visit(file);
          } else if (file.getName().endsWith(".java")) {
              System.out.println(file);
          }
      }
  }
modernCode: |-
  try (Stream<Path> paths = Files.walk(root)) {
      paths
          .filter(Files::isRegularFile)
          .filter(p -> p.toString().endsWith(".java"))
          .forEach(System.out::println);
  }
summary: "Use Files.walk() to traverse directory trees as a stream of Path values."
explanation: "The old File API pushes you toward hand-written recursion, null checks, and string-based path handling. Files.walk() exposes a directory tree as a Stream<Path>, so traversal can be filtered, mapped, limited, and closed with try-with-resources. It composes naturally with the rest of the NIO.2 API."
