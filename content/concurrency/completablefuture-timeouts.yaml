  title: "No scheduler boilerplate"
  desc: "No extra executor, scheduled task, or manual exceptional completion block."
- icon: "🔀"
  title: "Clear failure or fallback"
  desc: "Choose orTimeout() for failure or completeOnTimeout() for a default value."
