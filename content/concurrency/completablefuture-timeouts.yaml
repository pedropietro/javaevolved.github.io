oldLabel: "Manual scheduler"
modernLabel: "Java 9+"
oldApproach: "Scheduled timeout task"
modernApproach: "orTimeout()"
oldCode: |-
  ScheduledExecutorService scheduler =
      Executors.newSingleThreadScheduledExecutor();

  CompletableFuture<User> result = fetchUser(id);
  scheduler.schedule(
      () -> result.completeExceptionally(
          new TimeoutException("Timed out")),
      2, TimeUnit.SECONDS);
modernCode: |-
  CompletableFuture<User> result =
      fetchUser(id)
          .orTimeout(2, TimeUnit.SECONDS);
summary: "Use CompletableFuture.orTimeout() or completeOnTimeout() instead of a separate scheduler."
explanation: "Before Java 9, timing out a CompletableFuture meant creating a ScheduledExecutorService and wiring a task that completed the future manually. The timeout methods put that behavior on the future itself. Use orTimeout() when the operation should fail, or completeOnTimeout() when you want a fallback value."
whyModernWins:
