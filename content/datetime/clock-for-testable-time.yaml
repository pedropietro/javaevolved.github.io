oldCode: |-
  class TokenService {
      boolean expired(Instant expiresAt) {
          return Instant.now().isAfter(expiresAt);
      }
  }
modernCode: |-
  class TokenService {
      private final Clock clock;

      TokenService(Clock clock) {
          this.clock = clock;
      }

      boolean expired(Instant expiresAt) {
          return Instant.now(clock).isAfter(expiresAt);
      }
  }
summary: "Inject java.time.Clock instead of hard-coding the system clock in date/time logic."
explanation: "Calling now() directly inside domain code makes time-dependent behavior hard to test. A Clock lets production code use the system clock while tests provide Clock.fixed() or Clock.offset(). The logic still uses the java.time API, but time becomes an explicit dependency rather than hidden global state."
